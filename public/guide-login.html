<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide Login | Prashikshan</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.auth-wrap { width: 100%; max-width: 420px; }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo a { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
.auth-logo a span { color: var(--blue); }
.auth-card { padding: 40px; }
.auth-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 6px; }
.auth-sub { font-size: 14px; color: var(--text-3); margin-bottom: 28px; }
.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-4); }
.auth-footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
.guide-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--yellow-bg); color: var(--yellow); border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="auth-wrap fade-up">
  <div class="auth-logo">
    <a href="index.html">Prashik<span>shan</span></a>
  </div>

  <div class="auth-card card">
    <div class="guide-badge">🎓 Guide Portal</div>
    <div class="auth-title">Guide sign in</div>
    <div class="auth-sub">Access your guide dashboard to manage students and projects</div>

    <div class="alert alert-error" id="errorMsg"></div>

    <div class="field">
      <label class="label">Guide ID</label>
      <input type="text" class="input" id="guideID" placeholder="Enter your guide ID" autocomplete="username">
    </div>
    <div class="field">
      <label class="label">Password</label>
      <input type="password" class="input" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="loginGuide()">Sign in to Guide Portal</button>
  </div>

  <div class="auth-footer">
    Are you a student? <a href="student-login.html">Student login</a>
  </div>
</div>

<script>
function loginGuide() {
  const id = document.getElementById('guideID').value.trim();
  const pass = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');
  err.style.display = 'none';
  if (!id || !pass) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
  if (id === 'guide' && pass === '1234') {
    localStorage.setItem('guide', JSON.stringify({ name: 'Dr. Sharma', role: 'Guide' }));
    window.location.href = 'guide-dashboard.html';
  } else {
    err.textContent = 'Invalid guide credentials.';
    err.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') loginGuide(); });
</script>
</body>
</html>
